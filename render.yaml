services:
  - type: web
    name: return-shield-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: return-shield-db
          property: connectionString

databases:
  - name: return-shield-db
    databaseName: returnshield
    user: returnshield
    plan: free
